services:
  # ========================
  # Backend API (NestJS)
  # ========================
  - type: web
    name: learnhub-api
    env: node
    region: oregon
    plan: free
    buildCommand: yarn install && yarn workspace @learnhub/api db:generate && yarn workspace @learnhub/api build
    startCommand: yarn workspace @learnhub/api db:migrate && yarn workspace @learnhub/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: learnhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_URL
        sync: false

  # ========================
  # Frontend (Next.js)
  # ========================
  - type: web
    name: learnhub-web
    env: node
    region: oregon
    plan: free
    buildCommand: yarn install && yarn workspace @learnhub/web build
    startCommand: yarn workspace @learnhub/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  # ========================
  # PostgreSQL (Render)
  # ========================
  - name: learnhub-db
    region: oregon
    plan: free
    databaseName: learnhub
    user: learnhub
